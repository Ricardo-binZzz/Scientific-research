name: Bug report
description: Report a reproducible problem in the web UI, CLI, data checks, figure generation, or manuscript QA.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please remove private paths, paper contents, unpublished data, and credentials before posting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The manuscript check reports missing citations even though the library contains them.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Workflow area
      options:
        - Local web UI
        - CLI
        - Literature library
        - Reading notes
        - Simulation data
        - Figure generation
        - Manuscript QA
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact clicks or commands needed to reproduce the issue.
      placeholder: |
        1. Run .\start_web.bat
        2. Load examples/demo-project
        3. Click Project Check
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the error text or report output if it is safe to share.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11"
  - type: textarea
    id: sample
    attributes:
      label: Minimal sample data
      description: Paste a tiny sanitized CSV/Markdown snippet if the issue depends on input data.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private paths, credentials, unpublished papers, and private research data.
          required: true
